vulture = "*"
perflint = "*"
rst2html5 = "*"
flake8 = "*"
wily = "*"
ansi2html = "*"
graphviz = "*"
gprof2dot = "*"
pyright = "1.1.408"
pre-commit = "*"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
